<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TRADELAB · Paper Trading</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0d12;color:#e8ecf0;font-family:Arial,sans-serif;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#1e2535;border-radius:2px}
#header{background:#111520;border-bottom:1px solid #1e2535;padding:0 20px;position:sticky;top:0;z-index:99;display:flex;align-items:center;height:52px;gap:12px}
#logo{font-size:18px;font-weight:900;flex-shrink:0}
#logo span{color:#00d084}
#nav{display:flex;gap:4px;background:#0a0d12;border-radius:10px;padding:4px;border:1px solid #1e2535;margin:0 auto}
.tab{padding:7px 16px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:700;color:#6b7694;border:none;background:none;font-family:Arial,sans-serif;transition:background .15s,color .15s}
.tab.on{background:#161b26;color:#e8ecf0}
#livedot{display:flex;align-items:center;gap:6px;font-size:11px;color:#6b7694;flex-shrink:0}
.dot{width:7px;height:7px;border-radius:50%;background:#00d084;animation:pulse 2s infinite;display:inline-block}
#ticker{overflow:hidden;white-space:nowrap;background:#0d1018;border-bottom:1px solid #1e2535;padding:7px 0;font-size:12px}
.ti{display:inline-block;animation:scrollx 32s linear infinite}
.ti:hover{animation-play-state:paused}
#body{max-width:1280px;margin:0 auto;padding:20px 20px 40px}
.card{background:#161b26;border:1px solid #1e2535;border-radius:12px;padding:16px;transition:border-color .2s}
.card:hover{border-color:#2e3b50}
input,select{background:#111520;border:1px solid #1e2535;border-radius:8px;color:#e8ecf0;font-size:13px;padding:8px 12px;outline:none;font-family:Arial,sans-serif}
input:focus,select:focus{border-color:#00d084}
select option{background:#161b26}
button{border:none;border-radius:8px;padding:9px 18px;font-weight:700;font-size:13px;cursor:pointer;font-family:Arial,sans-serif;transition:opacity .15s,transform .1s}
button:hover{opacity:.85}
button:active{transform:scale(.97)}
.bg{background:#1e2535;color:#e8ecf0}
.gg{background:#00d084;color:#000}
.rr{background:#ff4757;color:#fff}
.mono{font-family:'Courier New',monospace}
.muted{color:#6b7694}
.lbl{font-size:10px;color:#6b7694;font-weight:700;letter-spacing:.05em;margin-bottom:4px}
.stat{background:#111520;border-radius:9px;padding:10px 12px;border:1px solid #1e2535}
.row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1e2535}
.g5{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:16px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.badge{display:inline-block;border-radius:8px;padding:5px 16px;font-weight:900;font-family:'Courier New',monospace;font-size:18px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes scrollx{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes fin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fin .35s ease}
</style>
</head>

</div>

<div id="body"><div style="color:#6b7694;padding:40px;text-align:center;font-size:16px">Loading...</div></div>

function initData(){
  q=Object.assign({},STOCKS["AAPL"]);
  idx.forEach(function(x,i){
    spk[x.n]=[];
    for(var j=0;j<24;j++) spk[x.n].push(x.p*(0.993+Math.random()*0.014));

function f(n,d){
  d=d===undefined?2:d;
  return Number(n).toLocaleString('en-IN',{minimumFractionDigits:d,maximumFractionDigits:d});
}
function clr(n){return n>=0?"#00d084":"#ff4757";}
function sg(n){return n>=0?"+":"";}
function sv(){localStorage.setItem("tb",bal);localStorage.setItem("tp",JSON.stringify(port));localStorage.setItem("tt",JSON.stringify(trd));}

function aiSig(qq){
  if(!qq)return null;
  var sc=0,rs=[];
  var pct=((qq.c-qq.pc)/qq.pc)*100;
  if(pct>2){sc+=30;rs.push("Strong upward momentum");}
  else if(pct>0){sc+=10;rs.push("Mild positive movement");}
  else if(pct<-2){sc-=30;rs.push("Sharp downward pressure");}
  else{sc-=10;rs.push("Slight bearish drift");}
  var rng=qq.h-qq.l,pos=rng>0?(qq.c-qq.l)/rng:0.5;
  if(pos>0.7){sc+=20;rs.push("Near daily high");}
  else if(pos<0.3){sc-=20;rs.push("Near daily low");}
  var ac,cf,co;
  if(sc>=25){ac="BUY";cf=Math.min(95,60+sc);co="#00d084";}
  else if(sc<=-15){ac="SELL";cf=Math.min(95,55-sc);co="#ff4757";}
  else{ac="HOLD";cf=60;co="#f0b429";}
  return{a:ac,cf:Math.round(cf),rs:rs.slice(0,2),co:co};
}

function drawL(id,data,color){
  var cv=document.getElementById(id);
  if(!cv||!data||data.length<2)return;
  var W=cv.offsetWidth||600,H=cv.height;
  cv.width=W;
  var ctx=cv.getContext("2d");
  ctx.clearRect(0,0,W,H);
  var mn=Math.min.apply(null,data),mx=Math.max.apply(null,data),rn=mx-mn||1;
  function px(i){return(i/(data.length-1))*(W-20)+10;}
  function py(v){return H-10-((v-mn)/rn)*(H-22);}
  var g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,color+"44");g.addColorStop(1,color+"00");
  ctx.beginPath();ctx.moveTo(px(0),py(data[0]));
  for(var i=1;i<data.length;i++)ctx.lineTo(px(i),py(data[i]));
  ctx.lineTo(px(data.length-1),H);ctx.lineTo(px(0),H);ctx.closePath();
  ctx.fillStyle=g;ctx.fill();
  ctx.beginPath();ctx.moveTo(px(0),py(data[0]));
  for(var i=1;i<data.length;i++)ctx.lineTo(px(i),py(data[i]));
  ctx.strokeStyle=color;ctx.lineWidth=2;ctx.lineJoin="round";ctx.stroke();
  ctx.beginPath();ctx.arc(px(data.length-1),py(data[data.length-1]),4,0,Math.PI*2);
  ctx.fillStyle=color;ctx.fill();
}
function drawS(id,data,color){
  var cv=document.getElementById(id);
  if(!cv||!data||data.length<2)return;
  var W=cv.width,H=cv.height,ctx=cv.getContext("2d");
  ctx.clearRect(0,0,W,H);
  var mn=Math.min.apply(null,data),mx=Math.max.apply(null,data),rn=mx-mn||1;
  ctx.beginPath();
  for(var i=0;i<data.length;i++){
    var x=(i/(data.length-1))*W,y=H-((data[i]-mn)/rn)*H;
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  }
  ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.lineJoin="round";ctx.stroke();
}

function buildTicker(){
  var arr=idx.concat(idx);
  var h=arr.map(function(x){
    return '<span style="padding:0 22px;display:inline-flex;gap:8px;align-items:center">'
      +'<span style="color:#6b7694;font-weight:700">'+x.n+'</span>'

      +'<span style="color:'+clr(x.c)+'">'+sg(x.c)+f(Math.abs(x.c))+'%</span></span>';
  }).join("");
  document.getElementById("tick").innerHTML=h;
}

function invested(){
  var s=0;
  Object.values(port).forEach(function(h){s+=h.qty*(h.avgPrice||0);});
  return s;
}

  if(tab==="market"){

    h+='<div class="card"><div class="lbl" style="margin-bottom:12px">ALL INDICES</div>';
    idx.forEach(function(x){
      h+='<div class="row"><div style="display:flex;gap:10px;align-items:center">'
        +'<div style="width:4px;height:38px;border-radius:2px;background:'+clr(x.c)+'"></div>'
        +'<div><div class="muted" style="font-size:10px">INDEX</div><div style="font-weight:700;font-size:14px">'+x.n+'</div></div></div>'
        +'<div style="text-align:right"><div class="mono" style="font-size:16px;font-weight:700">'+f(x.p)+'</div>'
        +'<div style="font-size:11px;color:'+clr(x.c)+'">'+sg(x.c)+f(Math.abs(x.c))+'%</div></div></div>';
    });
    h+='</div></div>';
  }

  else if(tab==="trade"){
    var diff=q?q.c-q.pc:0,dpct=q?(diff/q.pc)*100:0;
    h+='<div class="fade" style="display:grid;grid-template-columns:1fr 320px;gap:16px">';
    h+='<div style="display:flex;flex-direction:column;gap:14px">';
    h+='<div class="card" style="display:flex;gap:10px;align-items:center">'

    if(q){
      h+='<div class="card">'
        +'<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:14px">'

        h+='</div>';
      }
      h+='</div>';

      +(aOn?'<div class="dot"></div>':'')
      +'</div></div>';
    h+='<div class="g2">'
      +'<div class="card"><div class="lbl" style="margin-bottom:10px">P&amp;L CURVE</div>'
      +'<canvas id="ac" height="160" style="width:100%;display:block"></canvas></div>'
      +'<div class="card" style="overflow:auto;max-height:250px"><div class="lbl" style="margin-bottom:8px">TRADE LOG</div>';
    if(aLog.length===0){h+='<div class="muted" style="font-size:12px;padding:16px 0;text-align:center">Press Start to begin simulation</div>';}
    else aLog.forEach(function(t){
      var ac=t.a==="BUY"?"#00d084":t.a==="SELL"?"#ff4757":"#f0b429";
      h+='<div class="row" style="font-size:11px;gap:6px">'
        +'<span class="muted">'+t.tm+'</span>'
        +'<span style="color:'+ac+';font-weight:700">'+t.a+'</span>'
        +'<span style="flex:1">'+t.s+'&times;'+t.n+'</span>'
        +'<span class="mono" style="color:'+clr(t.r)+'">'+sg(t.r)+'&#8377;'+f(Math.abs(t.r))+'</span></div>';
    });
    h+='</div></div></div>';
  }

  else if(tab==="portfolio"){
    var inv2=invested(),tpnl2=(bal+inv2)-100000;
    h+='<div class="fade" style="display:flex;flex-direction:column;gap:16px">';
    h+='<div class="g4">';
    [["TOTAL VALUE","&#8377;"+f(bal+inv2),clr(tpnl2)],
     ["CASH","&#8377;"+f(bal),"#e8ecf0"],
     ["INVESTED","&#8377;"+f(inv2),"#3b82f6"],
     ["P&amp;L",(tpnl2>=0?"+ ":"&minus; ")+"&#8377;"+f(Math.abs(tpnl2)),clr(tpnl2)]
    ].forEach(function(row){
      h+='<div class="card" style="text-align:center"><div class="lbl">'+row[0]+'</div>'
        +'<div class="mono" style="font-size:18px;font-weight:900;color:'+row[2]+'">'+row[1]+'</div></div>';
    });
    h+='</div>';
    h+='<div class="card"><div class="lbl" style="margin-bottom:12px">PORTFOLIO CURVE</div>'
      +'<canvas id="pc" height="190" style="width:100%;display:block"></canvas></div>';
    h+='<div class="g2">';
    h+='<div class="card"><div class="lbl" style="margin-bottom:8px">OPEN POSITIONS</div>';
    var pk2=Object.keys(port);
    if(pk2.length===0){h+='<div class="muted" style="font-size:12px;padding:16px 0;text-align:center">No open positions</div>';}
    else pk2.forEach(function(s){
      var hh=port[s];
      h+='<div class="row"><div><div style="font-weight:700;font-size:14px">'+s+'</div>'
        +'<div class="muted" style="font-size:10px">'+hh.qty+' shares &middot; &#8377;'+f(hh.avgPrice)+'</div></div>'
        +'<div class="mono" style="font-size:14px;font-weight:700">&#8377;'+f(hh.qty*hh.avgPrice,0)+'</div></div>';
    });
    h+='</div>';
    h+='<div class="card" style="overflow:auto;max-height:300px"><div class="lbl" style="margin-bottom:8px">TRADE HISTORY</div>';
    if(trd.length===0){h+='<div class="muted" style="font-size:12px;padding:16px 0;text-align:center">No trades yet</div>';}
    else trd.forEach(function(t){
      h+='<div class="row" style="font-size:11px;gap:6px">'
        +'<span style="color:'+(t.type==="BUY"?"#00d084":"#ff4757")+';font-weight:700">'+t.type+'</span>'
        +'<span style="flex:1;font-weight:600">'+t.sym+'</span>'
        +'<span class="muted">&times;'+t.qty+'</span>'
        +'<span class="mono">&#8377;'+f(t.price)+'</span>'
        +'<span class="muted">'+new Date(t.at).toLocaleDateString()+'</span></div>';
    });
    h+='</div></div>';
    h+='<div class="card" style="text-align:center;background:#0d1018">'
      +'<div class="muted" style="font-size:11px;margin-bottom:10px">Starting: &#8377;1,00,000 &nbsp;&middot;&nbsp; Now: &#8377;'+f(bal+inv2)+'</div>'
      +'<button class="bg" onclick="rst()">&#8635; Reset Paper Account</button></div>';
    h+='</div>';
  }

  else if(tab==="news"){
    h+='<div class="fade">';
    h+='<div style="font-size:20px;font-weight:900;margin-bottom:16px">Market News <span class="muted" style="font-size:12px;font-weight:400">&middot; Sentiment</span></div>';
    h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px">';
    NEWS.forEach(function(a){
      var sc=a.s==="Positive"?"#00d084":a.s==="Negative"?"#ff4757":"#6b7694";
      var ic=a.s==="Positive"?"&#128200;":a.s==="Negative"?"&#128201;":"&#128202;";
      h+='<div class="card" style="display:flex;flex-direction:column;gap:10px">'
        +'<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">'
        +'<div style="font-size:13px;font-weight:700;line-height:1.4;flex:1">'+a.t+'</div>'
        +'<div style="background:'+sc+'22;color:'+sc+';border-radius:7px;padding:3px 8px;font-size:10px;font-weight:700;flex-shrink:0;border:1px solid '+sc+'33">'+ic+' '+a.s+'</div></div>'
        +'<div style="font-size:12px;color:#6b7694;line-height:1.6">'+a.d+'</div>'
        +'<div style="font-size:10px;color:#6b7694">'+new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})+'</div>'
        +'</div>';
    });
    h+='</div></div>';
  }

  document.getElementById("body").innerHTML=h;

  setTimeout(function(){
    if(tab==="market"){
      idx.forEach(function(x,i){drawS("sp"+i,spk[x.n],clr(x.c));});
      drawL("mc",chd["NIFTY 50"],"#00d084");
    }
    if(tab==="trade"&&q){drawL("sc",chd[sym]||chd["AAPL"],clr(q.c-q.pc));}
    if(tab==="auto"){drawL("ac",aHist.length>1?aHist:[0,0],clr(aPnl));}
    if(tab==="portfolio"){drawL("pc",ph.length>1?ph:[100000,100000],clr(tpnl));}
  },30);
}

function go(t){
  tab=t;
  document.querySelectorAll(".tab").forEach(function(el){el.classList.remove("on");});
  var ts=["market","trade","auto","portfolio","news"];
  document.querySelectorAll(".tab")[ts.indexOf(t)].classList.add("on");
  render();
}

function srch(){
  var v=(document.getElementById("si")||{}).value;
  if(!v)return;
  v=v.trim().toUpperCase();
  sym=v;
  var base=STOCKS[v];
  if(base){q=Object.assign({},base,{c:base.c*(0.997+Math.random()*0.006)});}
  else{q={c:200+Math.random()*300,o:200,h:220,l:190,pc:199,v:5000000};}
  if(!chd[v]){
    chd[v]=[];
    for(var j=0;j<50;j++) chd[v].push(q.c*(0.978+Math.random()*0.044)+Math.sin(j/4)*q.c*0.006);
  }
  render();
}

function setMsg(m){msg=m;render();if(mTimer)clearTimeout(mTimer);mTimer=setTimeout(function(){msg="";render();},3000);}

function doBuy(){
  var el=document.getElementById("qi");
  qty=parseInt(el?el.value:1)||1;
  if(!q)return;
  var cost=q.c*qty;
  if(cost>bal){setMsg("&#10060; Insufficient balance");return;}
  bal-=cost;
  var prev=port[sym]||{qty:0,avgPrice:0};
  var nq=prev.qty+qty;
  port[sym]={qty:nq,avgPrice:(prev.qty*prev.avgPrice+cost)/nq};
  trd.unshift({type:"BUY",sym:sym,qty:qty,price:q.c,at:Date.now()});
  trd=trd.slice(0,50);
  sv();
  setMsg("&#10003; Bought "+qty+"&times;"+sym+" @ &#8377;"+f(q.c));
}

function doSell(){
  var el=document.getElementById("qi");
  qty=parseInt(el?el.value:1)||1;
  if(!q)return;
  var held=(port[sym]||{}).qty||0;
  if(qty>held){setMsg("&#10060; Only "+held+" shares held");return;}
  bal+=q.c*qty;
  port[sym].qty-=qty;
  if(!port[sym].qty)delete port[sym];
  trd.unshift({type:"SELL",sym:sym,qty:qty,price:q.c,at:Date.now()});
  trd=trd.slice(0,50);
  sv();
  setMsg("&#10003; Sold "+qty+"&times;"+sym+" @ &#8377;"+f(q.c));
}

var AS=["AAPL","MSFT","NVDA","TSLA","META","GOOGL","AMZN","RELIANCE","TCS","INFY","TATAMOTORS"];
var RQ={low:1,medium:3,high:8};

function togAuto(){
  aOn=!aOn;
  if(aOn){
    var tick=function(){
      var s=AS[Math.floor(Math.random()*AS.length)];
      var base=STOCKS[s]||{c:200,pc:198,h:210,l:190,v:5000000};
      var qq=Object.assign({},base,{c:base.c*(0.996+Math.random()*0.008)});
      var sg=aiSig(qq);if(!sg)return;
      var n=RQ[aRisk]||3;
      var r=Math.round((qq.c*n*(0.977+Math.random()*0.046)-qq.c*n)*100)/100;
      aPnl=Math.round((aPnl+r)*100)/100;
      aHist.push(aPnl);if(aHist.length>50)aHist.shift();
      aLog.unshift({tm:new Date().toLocaleTimeString(),a:sg.a,s:s,n:n,r:r});
      if(aLog.length>30)aLog.pop();
      if(tab==="auto")render();
    };
    tick();aTmr=setInterval(tick,5000);
  }else{clearInterval(aTmr);}
  render();
}

function rst(){
  if(!confirm("Reset to &#8377;1,00,000?"))return;
  bal=100000;port={};trd=[];aPnl=0;aHist=[0];aLog=[];aOn=false;
  clearInterval(aTmr);sv();render();
}

setInterval(function(){
  idx.forEach(function(x){
    x.p=x.p*(0.9991+Math.random()*0.0018);
    spk[x.n].push(x.p);spk[x.n]=spk[x.n].slice(-24);
  });
  if(q)q.c=q.c*(0.9993+Math.random()*0.0014);
  buildTicker();
  if(tab==="market"||tab==="trade")render();
},3000);

initData();
buildTicker();
render();
</script>
</body>
</html>
